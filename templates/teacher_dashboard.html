<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Teacher Dashboard — Attendance System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <style>
        .welcome {
            margin-bottom: 24px;
            animation: fadeInUp 0.4s var(--ease) both;
        }

        .welcome .eyebrow {
            margin: 0 0 6px;
            color: var(--purple-500);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
        }

        .welcome h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        @media (min-width: 640px) {
            .welcome h2 { font-size: 1.8rem; }
        }

        .class-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        @media (min-width: 480px) {
            .class-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 900px) {
            .class-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .class-card {
            padding: 20px !important;
            display: flex;
            flex-direction: column;
            gap: 10px;
            cursor: default;
            background: rgba(255, 255, 255, 0.8) !important;
            border-left: 4px solid #8b5cf6 !important;
        }

        .class-card .class-code {
            font-size: 0.78rem;
            color: var(--purple-500);
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: none !important;
            border: none !important;
            padding: 0 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
        }

        .class-name {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-strong);
        }

        .take-btn {
            margin-top: auto;
            text-align: center;
            min-height: 46px;
            font-size: 0.92rem;
        }

        .empty-state {
            padding: 48px 20px !important;
            text-align: center;
        }

        .empty-state .empty-icon {
            font-size: 2.4rem;
            margin-bottom: 14px;
        }

        .empty-state p {
            font-size: 1rem;
            max-width: 320px;
            margin: 0 auto;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="gradient-orb gradient-orb-1"></div>
    <div class="gradient-orb gradient-orb-2"></div>

    <div class="topbar">
        <h1>Dashboard</h1>
        <div class="topbar-right">
            <span class="role-badge">TEACHER</span>
            <span>{{ user.username }}</span>
            <a href="/logout" class="logout-link">Logout</a>
        </div>
    </div>

    <main>
        <div class="welcome">
            <p class="eyebrow">Welcome back</p>
            <h2>Your Classes</h2>
        </div>

        {% if classes %}
        <div class="class-grid">
            {% for cls in classes %}
            <div class="class-card">
                <span class="class-code">{{ cls.code }}</span>
                <p class="class-name">{{ cls.name }}</p>
                <a href="/teacher/attendance/{{ cls._id }}" class="take-btn">Take Attendance</a>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="empty-state">
            <div class="empty-icon">📚</div>
            <p>No classes assigned to you yet. Please contact the administrator.</p>
        </div>
        {% endif %}
    </main>
</body>
</html>
