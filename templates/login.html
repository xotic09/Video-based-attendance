<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Attendance System</title>
    <style>
        :root {
            --bg: #f4f1ea;
            --panel: #fffaf2;
            --border: #d8cdbd;
            --text: #2b241c;
            --accent: #1f6f5f;
            --accent-dark: #174f44;
            --danger: #9b2c2c;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(31, 111, 95, 0.12), transparent 30%),
                linear-gradient(135deg, #efe7da, #f9f6ef 55%, #e8ddd0);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .shell {
            width: min(440px, 100%);
            background: rgba(255, 250, 242, 0.95);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px 32px;
            box-shadow: 0 24px 60px rgba(60, 44, 20, 0.14);
        }

        h1 {
            margin: 0 0 6px;
            font-size: 2rem;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #5b5146;
            margin: 0 0 28px;
            font-size: 0.95rem;
        }

        form { display: grid; gap: 16px; }

        label {
            display: grid;
            gap: 6px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font: inherit;
            background: #fff;
        }

        input:focus {
            outline: 2px solid var(--accent);
            border-color: var(--accent);
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 14px 18px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            background: var(--accent);
            margin-top: 4px;
        }

        button:hover { background: var(--accent-dark); }

        .error {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: var(--danger);
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.9rem;
            text-align: center;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #5b5146;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover { text-decoration: underline; }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
</head>
<body>
    <div class="shell">
        <h1>Attendance System</h1>
        <p class="subtitle">Sign in to continue</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <label>
                Username
                <input type="text" name="username" required autofocus>
            </label>
            <label>
                Password
                <input type="password" name="password" required>
            </label>
            <button type="submit">Sign In</button>
        </form>

        <p class="footer">Credentials are provided by your administrator.</p>
    </div>
</body>
</html>
