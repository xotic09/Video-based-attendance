<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login — Attendance System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            min-height: 100vh;
            min-height: 100dvh;
            background:
                radial-gradient(ellipse at top left, rgba(168, 85, 247, 0.15), transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(59, 130, 246, 0.1), transparent 50%),
                radial-gradient(ellipse at center top, rgba(236, 72, 153, 0.08), transparent 60%),
                linear-gradient(135deg, #f5f0ff 0%, #ede5ff 50%, #e8f4ff 100%) !important;
        }

        .login-shell {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.82) !important;
            border: 1px solid rgba(139, 92, 246, 0.12);
            border-radius: var(--radius-xl);
            padding: 32px 24px;
            box-shadow: var(--shadow-lg), 0 0 60px rgba(139, 92, 246, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: fadeInUp 0.5s var(--ease) both;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 14px;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
        }

        .login-brand h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--purple-700), var(--purple-500));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-brand .subtitle {
            margin: 6px 0 0;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--muted-strong);
        }

        .form-group input {
            min-height: 48px;
            padding: 12px 16px;
            font-size: 1rem;
            border-radius: var(--radius-md);
        }

        .login-btn {
            min-height: 50px;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 4px;
            border-radius: var(--radius-full);
        }

        .error-box {
            background: var(--danger-soft);
            border: 1px solid rgba(239, 68, 68, 0.15);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            text-align: center;
            font-weight: 500;
            animation: fadeIn 0.3s var(--ease);
        }

        .login-footer {
            text-align: center;
            margin-top: 22px;
            font-size: 0.85rem;
            color: var(--muted);
        }

        @media (min-width: 640px) {
            .login-shell { padding: 40px 36px; }
        }
    </style>
</head>
<body>
    <!-- Dynamic gradient orbs -->
    <div class="gradient-orb gradient-orb-1"></div>
    <div class="gradient-orb gradient-orb-2"></div>
    <div class="gradient-orb gradient-orb-3"></div>

    <div class="login-shell">
        <div class="login-brand">
            <div class="login-icon">📋</div>
            <h1>Attendance System</h1>
            <p class="subtitle">Sign in to continue</p>
        </div>

        {% if error %}
            <div class="error-box">{{ error }}</div>
        {% endif %}

        <form class="login-form" method="post" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus autocomplete="username" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <p class="login-footer">Credentials are provided by your administrator.</p>
    </div>
</body>
</html>
