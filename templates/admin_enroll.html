<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Student Enrollment — Attendance System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <style>
        h2 {
            margin: 0 0 14px;
            font-size: 1.15rem;
        }

        /* ── Class Selector ── */
        .class-selector {
            margin-bottom: 18px;
        }

        .class-selector label {
            font-weight: 600;
            font-size: 0.88rem;
            display: block;
            margin-bottom: 6px;
            color: var(--muted-strong);
        }

        .class-selector select {
            width: 100%;
            min-height: 48px;
            font-size: 0.95rem;
        }

        /* ── Enrolled Tags ── */
        .enrolled-section {
            margin-bottom: 18px;
        }

        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 12px;
            padding: 6px 14px;
            background: var(--purple-100);
            border-radius: var(--radius-full);
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--purple-700);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .enrolled-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 6px 14px !important;
            border-radius: var(--radius-full) !important;
            font-size: 0.84rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--purple-50) !important;
            border: 1px solid var(--purple-200) !important;
            color: var(--purple-700);
            animation: fadeIn 0.3s var(--ease) both;
        }

        .no-enrolled {
            color: var(--muted);
            font-style: italic;
            font-size: 0.88rem;
        }

        /* ── Search ── */
        .search-box {
            margin-bottom: 12px;
        }

        /* ── Select All ── */
        .select-all-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--muted);
        }

        .select-all-bar label {
            cursor: pointer;
        }

        /* ── Student List ── */
        .student-list {
            max-height: 400px;
            overflow-y: auto;
            border-radius: var(--radius-md);
        }

        .student-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            cursor: pointer;
            transition: background 150ms var(--ease);
            min-height: 52px;
        }

        .student-item:last-child {
            border-bottom: 0 !important;
        }

        .student-info {
            flex: 1;
            min-width: 0;
        }

        .student-name {
            font-weight: 600;
            font-size: 0.92rem;
            color: var(--text-strong);
        }

        .student-username {
            font-size: 0.8rem;
        }

        .empty-list {
            text-align: center;
            padding: 24px;
            color: var(--muted);
            font-style: italic;
        }

        /* ── Enroll Bar ── */
        .enroll-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 14px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .selected-count {
            font-size: 0.88rem;
            font-weight: 600;
        }

        .enroll-bar button {
            min-height: 44px;
        }

        @media (max-width: 479px) {
            .enroll-bar {
                flex-direction: column;
            }

            .enroll-bar button {
                width: 100%;
            }
        }

        .no-class-msg {
            text-align: center;
            padding: 24px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <a href="/admin">&larr; Dashboard</a>
            <h1>Enrollment</h1>
        </div>
        <div class="topbar-right">
            <span class="role-badge">ADMIN</span>
            <span>{{ user.username }}</span>
            <a href="/logout" class="logout-link">Logout</a>
        </div>
    </div>

    <main>
        <div class="card">
            <div class="class-selector">
                <label for="classSelect">Select Class</label>
                <select id="classSelect" onchange="onClassChange()">
                    <option value="">— Choose a class —</option>
                    {% for cls in classes %}
                    <option value="{{ cls._id }}"
                        data-enrolled='{{ (cls.enrolled_students or [])|tojson }}'
                        {% if selected_class and cls._id|string == selected_class %}selected{% endif %}>
                        {{ cls.code }} — {{ cls.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Enrolled students -->
            <div id="enrolledSection" class="enrolled-section hidden">
                <p class="section-label">Currently Enrolled</p>
                <div id="enrolledTags" class="enrolled-tags"></div>
            </div>

            <!-- Student selection -->
            <div id="studentArea" class="hidden">
                <p class="section-label">Available Students</p>
                <input type="text" class="search-box" id="searchBox" placeholder="Search students by name or username..." oninput="filterStudents()">

                <div class="select-all-bar">
                    <input type="checkbox" id="selectAllCb" onchange="toggleSelectAll()">
                    <label for="selectAllCb">Select All</label>
                </div>

                <form method="post" action="/admin/enroll-students" id="enrollForm">
                    <input type="hidden" name="class_id" id="classIdInput" value="">
                    <div class="student-list" id="studentList"></div>

                    <div class="enroll-bar">
                        <span class="selected-count" id="selectedCount">0 selected</span>
                        <button type="submit" id="enrollBtn" disabled>Enroll Selected</button>
                    </div>
                </form>
            </div>

            <div id="noClassMsg" class="no-class-msg">
                <p>Select a class above to manage enrollment.</p>
            </div>
        </div>
    </main>

    <script>
        const allStudents = [
            {% for s in students %}
            { username: {{ s.username|tojson }}, full_name: {{ s.full_name|tojson }} },
            {% endfor %}
        ];

        function onClassChange() {
            const sel = document.getElementById('classSelect');
            const opt = sel.options[sel.selectedIndex];
            const classId = sel.value;

            const enrolledSection = document.getElementById('enrolledSection');
            const studentArea = document.getElementById('studentArea');
            const noClassMsg = document.getElementById('noClassMsg');

            if (!classId) {
                enrolledSection.classList.add('hidden');
                studentArea.classList.add('hidden');
                noClassMsg.classList.remove('hidden');
                return;
            }

            noClassMsg.classList.add('hidden');
            document.getElementById('classIdInput').value = classId;

            const enrolled = JSON.parse(opt.dataset.enrolled || '[]');
            const tagsDiv = document.getElementById('enrolledTags');

            if (enrolled.length > 0) {
                let tagsHtml = '';
                enrolled.forEach(username => {
                    tagsHtml += '<span class="tag">' + username +
                        '<form method="post" action="/admin/unenroll-student" style="display:inline;margin:0;">' +
                        '<input type="hidden" name="class_id" value="' + classId + '">' +
                        '<input type="hidden" name="student_username" value="' + username + '">' +
                        '<button type="submit" class="tag-remove" title="Remove ' + username + '">&times;</button>' +
                        '</form></span>';
                });
                tagsDiv.innerHTML = tagsHtml;
                enrolledSection.classList.remove('hidden');
            } else {
                tagsDiv.innerHTML = '<span class="no-enrolled">No students enrolled yet.</span>';
                enrolledSection.classList.remove('hidden');
            }

            const available = allStudents.filter(s => !enrolled.includes(s.username));
            const listDiv = document.getElementById('studentList');

            if (available.length > 0) {
                let listHtml = '';
                available.forEach(s => {
                    listHtml += '<label class="student-item" data-name="' + s.full_name.toLowerCase() + '" data-user="' + s.username.toLowerCase() + '">' +
                        '<input type="checkbox" name="student_usernames" value="' + s.username + '" onchange="updateCount()">' +
                        '<div class="student-info">' +
                        '<div class="student-name">' + s.full_name + '</div>' +
                        '<div class="student-username">@' + s.username + '</div>' +
                        '</div></label>';
                });
                listDiv.innerHTML = listHtml;
                studentArea.classList.remove('hidden');
            } else {
                listDiv.innerHTML = '<div class="empty-list">All students are already enrolled in this class.</div>';
                studentArea.classList.remove('hidden');
            }

            document.getElementById('searchBox').value = '';
            document.getElementById('selectAllCb').checked = false;
            updateCount();
        }

        function filterStudents() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            document.querySelectorAll('.student-item').forEach(item => {
                const name = item.dataset.name;
                const user = item.dataset.user;
                if (name.includes(query) || user.includes(query)) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        }

        function updateCount() {
            const checked = document.querySelectorAll('#studentList input[type="checkbox"]:checked');
            const count = checked.length;
            document.getElementById('selectedCount').textContent = count + ' selected';
            document.getElementById('enrollBtn').disabled = count === 0;

            document.querySelectorAll('.student-item').forEach(item => {
                const cb = item.querySelector('input[type="checkbox"]');
                item.classList.toggle('selected', cb.checked);
            });

            const total = document.querySelectorAll('#studentList input[type="checkbox"]').length;
            document.getElementById('selectAllCb').checked = total > 0 && count === total;
        }

        function toggleSelectAll() {
            const checked = document.getElementById('selectAllCb').checked;
            document.querySelectorAll('.student-item:not(.hidden) input[type="checkbox"]').forEach(cb => {
                cb.checked = checked;
            });
            updateCount();
        }

        window.addEventListener('DOMContentLoaded', function() {
            const sel = document.getElementById('classSelect');
            if (sel.value) onClassChange();
        });
    </script>
</body>
</html>
